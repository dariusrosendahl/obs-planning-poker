<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Poker</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel">
    <div class="title-row">
      <h1>Planning Poker</h1>
      <button id="btn-pin" class="pip-btn" title="Pin on top">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="2" width="7" height="6" rx="1.5" fill="currentColor"/></svg>
      </button>
    </div>
    <div class="current">
      <span class="current-label">Current</span>
      <span id="current-value" class="current-value">0</span>
    </div>
    <div id="card-grid" class="card-grid"></div>
    <div class="controls">
      <button id="btn-prev" class="control-btn">&larr; Prev</button>
      <button id="btn-reveal" class="control-btn reveal-btn">Reveal / Hide</button>
      <button id="btn-next" class="control-btn">Next &rarr;</button>
    </div>
    <div class="shortcuts">
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> cycle &nbsp;
      <kbd>Space</kbd> reveal/hide &nbsp;
      <kbd>0</kbd>-<kbd>8</kbd> pick by position
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
