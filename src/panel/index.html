<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Poker</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel">
    <div class="title-row">
      <h1>Planning Poker</h1>
      <div class="title-actions">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.7 1h2.6l.3 2.1a5 5 0 011.3.7L13 2.7l1.3 2.3-1.7 1.4a5 5 0 010 1.5l1.7 1.4-1.3 2.3-2.1-1.1a5 5 0 01-1.3.7L9.3 15H6.7l-.3-2.1a5 5 0 01-1.3-.7L3 13.3 1.7 11l1.7-1.4a5 5 0 010-1.5L1.7 6.7 3 4.4l2.1 1.1a5 5 0 011.3-.7L6.7 1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="8" cy="8.1" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
        </button>
        <button id="btn-pin" class="icon-btn" title="Pin on top">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9.5 1.5l5 5-3.5 2-.5 2.5L8 13.5V10L4 14l-2-2 4-4H2.5L5 5.5l2.5-.5 2-3.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="setting-row">
        <label for="port-input">Server port</label>
        <div class="setting-input-group">
          <input id="port-input" type="number" min="1024" max="65535" class="setting-input">
          <button id="btn-save-port" class="setting-save">Save</button>
        </div>
      </div>
      <div class="setting-row">
        <label>OBS Browser Source URL</label>
        <code id="obs-url" class="obs-url-value">...</code>
      </div>
      <div id="restart-notice" class="restart-notice hidden">Restart app to apply new port</div>
    </div>

    <div class="current">
      <span class="current-label">Current</span>
      <span id="current-value" class="current-value">0</span>
    </div>
    <div id="card-grid" class="card-grid"></div>
    <div class="controls">
      <button id="btn-prev" class="control-btn">&larr; Prev</button>
      <button id="btn-reveal" class="control-btn reveal-btn">Reveal / Hide</button>
      <button id="btn-next" class="control-btn">Next &rarr;</button>
    </div>
    <div class="shortcuts">
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> cycle &nbsp;
      <kbd>Space</kbd> reveal/hide &nbsp;
      <kbd>0</kbd>-<kbd>8</kbd> pick by position
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
