<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- White background -->
  <rect width="1024" height="1024" rx="228" fill="#ffffff"/>

  <!-- Handle outer (filled D-shape using two overlapping rects) -->
  <rect x="600" y="400" width="160" height="220" rx="60" fill="#3C3C3C"/>
  <!-- Handle inner cutout (white to create the hole) -->
  <rect x="600" y="440" width="110" height="140" rx="40" fill="#ffffff"/>

  <!-- Mug body (overlaps handle left edge to join seamlessly) -->
  <rect x="250" y="360" width="380" height="330" rx="36" fill="#3C3C3C"/>

  <!-- Coffee surface -->
  <rect x="280" y="394" width="320" height="56" rx="10" fill="#7B5B4A"/>

  <!-- Steam lines (filled rounded rects) -->
  <rect x="350" y="200" width="18" height="120" rx="9" fill="#D4D4D4"/>
  <rect x="430" y="170" width="18" height="150" rx="9" fill="#D4D4D4"/>
  <rect x="510" y="200" width="18" height="120" rx="9" fill="#D4D4D4"/>

  <!-- Saucer -->
  <ellipse cx="450" cy="720" rx="240" ry="30" fill="#E8E8E8"/>
</svg>
